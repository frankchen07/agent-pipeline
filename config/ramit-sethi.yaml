advisor:
  name: "Ramit Sethi"
  slug: "ramit-sethi"
  domain: "Personal Finance, Career, Life Design"
  description: "Financial advisor focused on psychology, earning, and intentional living"

paths:
  sources: "sources"
  output: "output/ramit-sethi"
  prompts: "prompts"
  base_prompt: "prompts/context_compaction_prompt.md"
  advisor_addendum: "prompts/ramit_addendum.md"

# Filename-pattern-based auto-classification (fnmatch style)
# Order matters: first match wins
classification_rules:
  - pattern: "text-book-*"
    tier: primary
  - pattern: "moneyforcouples-*"
    tier: primary
  - pattern: "text-podcast-*"
    tier: primary
  - pattern: "tim-ferriss-*"
    tier: secondary
  - pattern: "text-chatgptconvo-*"
    tier: non-canonical
  # Fallback: unrecognized → LLM classifies

# Files to skip entirely (Frank's personal content, not source material)
exclude_patterns:
  - "text-miseenmoney-*"
  - "text-chatgptconvo-*"
  - "context compaction prompt*"
  - "ramit sethi compaction prompt addendum*"

llm:
  sonnet_model: "claude-sonnet-4-6-20250514"
  haiku_model: "claude-haiku-4-5-20251001"
  openrouter_sonnet_model: "anthropic/claude-sonnet-4.6"
  openrouter_haiku_model: "anthropic/claude-haiku-4.5"
  max_tokens_extraction: 8000
  max_tokens_classify: 512
  max_tokens_summarize: 4000
  max_tokens_runtime_context: 4000

chunking:
  target_tokens: 500
  min_tokens: 150
  max_tokens: 650
  # No overlap — research shows it adds cost with no recall benefit
  overlap_tokens: 0
  tokenizer: "cl100k_base"
  # Maximum chunks to sample per source for per-source summary (Stage 4)
  max_sample_chunks: 40

embeddings:
  model: "all-MiniLM-L6-v2"
  # Only embed primary + secondary chunks (skip non-canonical)
  tiers_to_embed: ["primary", "secondary"]

# Top-N primary/high-confidence chunks to include in project_upload/chunks/
project_upload:
  top_chunks_per_category: 10
  include_tiers: ["primary"]
  min_confidence: "high"
